<!DOCTYPE html>
<html>
<head>
    <title>Register | Smart College Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="login-box">
    <h2>Create Account</h2>
    <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Register as a student to access notes, timetable updates, assignments, and notices.</p>

    <form method="POST">
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>

    <p style="margin-top:1.25rem; color: var(--text-muted);">After registering, you will receive a verification code by email.</p>
    <p style="color: var(--text-muted);">
        Already have an account? <a href="/">Login here</a>
    </p>
</div>

</body>
</html>
