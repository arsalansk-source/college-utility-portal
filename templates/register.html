<!DOCTYPE html>
<html>
<head>
    <title>Register | Smart College Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="login-box">
    <h2>Create Account</h2>

    <form method="POST">
        <input type="email" name="email" placeholder="Email Address" required style="width: 100%; padding: 10px; margin-bottom: 15px;">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>

    <p>After registering, you will receive a verification code by email.</p>
    <p>
        Already have an account?
        <a href="/">Login here</a>
    </p>
</div>

</body>
</html>
