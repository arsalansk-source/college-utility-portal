<!DOCTYPE html>
<html>
<head>
    <title>Add Notice</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="login-box" style="max-width: 600px; margin: 2rem auto; text-align: left;">
    <h2>Add New Notice</h2>
    <a href="/notices" style="margin-bottom: 1rem; display: inline-block;">⬅ Back to Notices</a>
    <hr>
    <form method="POST">
        <input type="text" name="title" placeholder="Notice Title" required>
        <textarea name="content" placeholder="Notice Content" required style="height: 150px;"></textarea>
        <button type="submit">Post Notice</button>
    </form>
</div>

</body>
</html>
